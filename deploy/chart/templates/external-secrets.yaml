{{- if .Values.externalSecrets.lockboxSecretIds.postgresDsn }}
---
# ExternalSecret: POSTGRES_DSN + POSTGRES_PASSWORD from Lockbox
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "yaxter.fullname" . }}-postgres-dsn
  labels:
    {{- include "yaxter.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: lockbox-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ include "yaxter.secretName" . }}
    creationPolicy: Merge
  data:
    - secretKey: POSTGRES_DSN
      remoteRef:
        key: {{ .Values.externalSecrets.lockboxSecretIds.postgresDsn }}
        property: dsn
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.lockboxSecretIds.postgresDsn }}
        property: password
{{- end }}
{{- if .Values.externalSecrets.lockboxSecretIds.jwtSeed }}
---
# ExternalSecret: JWT signing secrets from Lockbox
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "yaxter.fullname" . }}-jwt
  labels:
    {{- include "yaxter.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: lockbox-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ include "yaxter.secretName" . }}
    creationPolicy: Merge
  data:
    - secretKey: AUTH_JWT_SEED_B64
      remoteRef:
        key: {{ .Values.externalSecrets.lockboxSecretIds.jwtSeed }}
        property: seed_b64
    - secretKey: AUTH_JWT_KID
      remoteRef:
        key: {{ .Values.externalSecrets.lockboxSecretIds.jwtSeed }}
        property: kid
{{- end }}
{{- if .Values.externalSecrets.lockboxSecretIds.oauthSecrets }}
