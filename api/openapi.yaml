openapi: 3.0.3
info:
  title: Yaxter API
  version: 0.1.0
  description: |
    Twitter-like demo API (ARCHITECTURE.md §1.2). This file is the source of
    truth: Go server stubs, the Go client (seed/k6), and the SPA client
    (orval, T1.7) are generated from it. All IDs are 64-bit snowflakes
    serialized as decimal strings.
tags:
  - name: auth
  - name: users
  - name: tweets
  - name: timeline
  - name: notifications
  - name: media
servers:
  - url: /v1
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Create an account
      operationId: register
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created; standard token pair issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/login:
    post:
      tags: [auth]
      summary: Log in with username/email + password
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token pair issued. OAuth-only accounts (no password) get a uniform 401.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/refresh:
    post:
      tags: [auth]
      summary: Rotate the refresh token, issue a new pair
      operationId: refreshToken
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New pair; old refresh token is revoked (rotation). Reuse of a rotated token revokes the whole family.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      tags: [auth]
      summary: Revoke the current refresh-token family
      operationId: logout
      responses:
        '204':
          description: Logged out.
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/providers:
    get:
      tags: [auth]
      summary: List enabled OAuth providers (config-driven)
      operationId: listAuthProviders
      security: []
      responses:
        '200':
          description: Enabled providers; clients render only these buttons.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderList'
  /auth/oauth/{provider}/start:
    get:
      tags: [auth]
      summary: Begin the authorization-code + PKCE dance
      operationId: oauthStart
      security: []
      parameters:
        - $ref: '#/components/parameters/Provider'
        - name: redirect_to
          in: query
          description: SPA route to return to after callback (validated allowlist).
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the provider with state + PKCE challenge.
          headers:
            Location:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/oauth/{provider}/callback:
    get:
      tags: [auth]
      summary: Provider callback — exchange code, upsert identity, issue tokens
      operationId: oauthCallback
      security: []
      parameters:
        - $ref: '#/components/parameters/Provider'
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Same shape as login. State is single-use; replays get 400.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/oauth/{provider}/link:
    post:
      tags: [auth]
      summary: Start linking a provider to the authenticated account
      operationId: oauthLink
      parameters:
        - $ref: '#/components/parameters/Provider'
      responses:
        '200':
          description: URL to complete linking at the provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkStartResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [auth]
      summary: Unlink a provider
      operationId: oauthUnlink
      parameters:
        - $ref: '#/components/parameters/Provider'
      responses:
        '204':
          description: Unlinked.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Refused — unlinking would leave the account with no credential (OAuth-only account, no password).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/me:
    get:
      tags: [users]
      summary: Current user's profile (read-your-writes)
      operationId: getMe
      responses:
        '200':
          description: Profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [users]
      summary: Update profile
      operationId: updateMe
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile (cache deleted on write).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/{username}:
    get:
      tags: [users]
      summary: Public profile
      operationId: getUser
      security: []
      parameters:
        - $ref: '#/components/parameters/Username'
      responses:
        '200':
          description: Profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/{username}/follow:
    post:
      tags: [users]
      summary: Follow a user (idempotent; writes both edge tables + event in one tx)
      operationId: followUser
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Following (already-following is a no-op 204).
        '400':
          description: Self-follow rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      tags: [users]
      summary: Unfollow a user (idempotent)
      operationId: unfollowUser
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Not following anymore.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/{username}/followers:
    get:
      tags: [users]
      summary: Who follows this user
      operationId: listFollowers
      security: []
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Page of followers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/{username}/following:
    get:
      tags: [users]
      summary: Who this user follows
      operationId: listFollowing
      security: []
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Page of followees.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage'
        '404':
          $ref: '#/components/responses/NotFound'
  /tweets:
    post:
      tags: [tweets]
      summary: Create a tweet or retweet (retweet_of_id set)
      operationId: createTweet
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTweetRequest'
      responses:
        '201':
          description: Acked once the row + outbox event are committed (§2.4). Duplicate Idempotency-Key replays this exact response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tweet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: retweet_of_id or a media_id does not exist / is not ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /tweets/{id}:
    get:
      tags: [tweets]
      summary: Fetch one tweet
      operationId: getTweet
      security: []
      parameters:
        - $ref: '#/components/parameters/TweetId'
      responses:
        '200':
          description: The tweet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tweet'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [tweets]
      summary: Delete own tweet
      operationId: deleteTweet
      parameters:
        - $ref: '#/components/parameters/TweetId'
      responses:
        '204':
          description: Deleted; TweetDeleted event emitted via outbox.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /tweets/{id}/like:
    post:
      tags: [tweets]
      summary: Like (idempotent — PK ON CONFLICT DO NOTHING)
      operationId: likeTweet
      parameters:
        - $ref: '#/components/parameters/TweetId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Liked.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      tags: [tweets]
      summary: Unlike (idempotent)
      operationId: unlikeTweet
      parameters:
        - $ref: '#/components/parameters/TweetId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Not liked anymore.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: UUID dedupe key; 24h window (ARCHITECTURE.md §7).
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      description: Opaque cursor from the previous page's next_cursor.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Username:
      name: username
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_]{3,30}$'
    TweetId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    MediaId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    Provider:
      name: provider
      in: path
      required: true
      description: Enabled set is config-driven; discover via /auth/providers.
      schema:
        type: string
        enum: [yandex, google]
  schemas:
    Id:
      type: string
      pattern: '^[0-9]+$'
      description: Snowflake ID as a decimal string (int64-safe in JSON).
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable code, e.g. validation_failed.
        message:
          type: string
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          pattern: '^[A-Za-z0-9_]{3,30}$'
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          description: Username or email.
        password:
          type: string
    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: Omit when the HttpOnly refresh cookie is present (web).
    TokenPair:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Access-token lifetime in seconds (900 = 15 min).
        refresh_token:
          type: string
          description: Returned in the body for non-web clients; web clients get a SameSite=Strict HttpOnly cookie instead.
    UserSummary:
      type: object
      required: [id, username]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        username:
          type: string
        avatar_url:
          type: string
          nullable: true
    User:
      type: object
      required: [id, username, bio, followers_count, following_count, created_at]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        username:
          type: string
        bio:
          type: string
        avatar_url:
          type: string
          nullable: true
        followers_count:
          type: integer
        following_count:
          type: integer
        created_at:
          type: string
          format: date-time
    PrivateUser:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          required: [email, has_password, linked_providers]
          properties:
            email:
              type: string
              format: email
            has_password:
              type: boolean
              description: false for OAuth-only accounts (pass_hash NULL).
            linked_providers:
              type: array
              items:
                type: string
    AuthResponse:
      type: object
      required: [user, tokens]
      properties:
        user:
          $ref: '#/components/schemas/PrivateUser'
        tokens:
          $ref: '#/components/schemas/TokenPair'
    OAuthProviderInfo:
      type: object
      required: [name, display_name, start_url]
      properties:
        name:
          type: string
        display_name:
          type: string
        start_url:
          type: string
    ProviderList:
      type: object
      required: [providers]
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/OAuthProviderInfo'
    LinkStartResponse:
      type: object
      required: [auth_url]
      properties:
        auth_url:
          type: string
          description: Provider URL to complete linking in the browser.
    UpdateProfileRequest:
      type: object
      properties:
        bio:
          type: string
          maxLength: 160
        avatar_media_id:
          $ref: '#/components/schemas/Id'
    MediaRef:
      type: object
      required: [id, urls]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        urls:
          type: object
          required: [thumb, feed, orig]
          description: Fixed scheme https://media.{domain}/{variant}/{media_id}.webp (§2.5).
          properties:
            thumb:
              type: string
            feed:
              type: string
            orig:
              type: string
    CreateTweetRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          maxLength: 280
          description: May be empty only when retweet_of_id is set.
        media_ids:
          type: array
          maxItems: 4
          items:
            $ref: '#/components/schemas/Id'
          description: Each must be in `ready` state.
        retweet_of_id:
          $ref: '#/components/schemas/Id'
    Tweet:
      type: object
      required: [id, author, text, likes_count, retweets_count, created_at]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        author:
          $ref: '#/components/schemas/UserSummary'
        text:
          type: string
        retweet_of:
          allOf:
            - $ref: '#/components/schemas/Tweet'
          nullable: true
          description: One level deep — retweets of retweets are flattened to the original.
        media:
          type: array
          items:
            $ref: '#/components/schemas/MediaRef'
        likes_count:
          type: integer
          description: Eventual (±seconds), from the counter pipeline (§2.7).
        retweets_count:
          type: integer
        liked_by_me:
          type: boolean
          description: Present only on authenticated reads.
        created_at:
          type: string
          format: date-time
    TweetPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Tweet'
        next_cursor:
          type: string
          nullable: true
          description: Absent/null on the last page.
    UserPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserSummary'
        next_cursor:
          type: string
          nullable: true
  responses:
    BadRequest:
      description: Malformed request or validation failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing/invalid/expired credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated but not allowed (ownership checks).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource does not exist (uniform — no enumeration leaks).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: State conflict (duplicate, in-flight idempotent request).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limited.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the window frees up.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
