name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # ubuntu-latest ships Docker, so testcontainers integration tests run here.
      - run: go test -race ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make build

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Lint OpenAPI
        run: npx -y @stoplight/spectral-cli lint --fail-severity=error api/openapi.yaml
      - name: Lint protos
        run: go run github.com/bufbuild/buf/cmd/buf@v1.47.2 lint
      - name: Proto breaking-change gate
        if: github.event_name == 'pull_request'
        run: |
          if git ls-tree -r origin/main --name-only 2>/dev/null | grep -q '\.proto$'; then
            go run github.com/bufbuild/buf/cmd/buf@v1.47.2 breaking --against '.git#branch=origin/main'
          else
            echo "No .proto files on origin/main — skipping breaking-change check (first introduction)"
          fi
      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@$(go list -m -f '{{.Version}}' google.golang.org/protobuf)
      - name: Generated code is up to date
        run: |
          make generate
          git diff --exit-code

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm install
      - name: Generated client is up to date
        run: |
          npm run generate
          git diff --exit-code ../web/src/api
      - run: npm run build
      - name: Bundle budget (< 300 KB gz)
        run: |
          total=0
          for f in dist/assets/*.js; do
            size=$(gzip -c "$f" | wc -c)
            total=$((total + size))
          done
          echo "gzipped js total: $total bytes"
          test "$total" -lt 307200
      - name: E2E smoke vs mock
        run: |
          npx playwright install --with-deps chromium
          npm run e2e
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: yaxter:${{ github.sha }}
          outputs: type=docker,dest=/tmp/yaxter-image.tar
      - name: Push image (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            cr.yandex/${{ secrets.YC_CR_REGISTRY_ID }}/yaxter:${{ github.sha }}
            cr.yandex/${{ secrets.YC_CR_REGISTRY_ID }}/yaxter:latest
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          input: /tmp/yaxter-image.tar
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  helm-render:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint deploy/chart
      - name: Template demo values
        run: helm template yaxter deploy/chart -f deploy/chart/values-demo.yaml > /dev/null
      - name: Template prod values
        run: helm template yaxter deploy/chart -f deploy/chart/values-prod.yaml > /dev/null

  terraform:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
      - name: Format check
        run: terraform -chdir=infra fmt -check -recursive
      - name: Init (no backend)
        run: terraform -chdir=infra init -backend=false
      - name: Validate
        run: terraform -chdir=infra validate
